name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: vishalgupta827/my-docker-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: vishalgupta-unthinakable/my-k8s-app
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifests

      - name: Bump image tag in deployment.yaml
        run: |
          cd manifests
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${GITHUB_SHA}|" deployment.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Update my-docker-app to ${GITHUB_SHA::7}"
          git push
